<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medias in HTML</title>
  </head>
  <body>
    <!--videos in html-->
    <p>Video in HTML</p>
    <video src="video.mp4" width="300" height="150" controls></video>
    <!--Audios in html-->
   <p> Audio in HTML</p>
    <audio src="audio.mp3" controls></audio>
    <!--iframes in html-->
    <P> Using Iframe to load youtube video</P>
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/XZwBNDGuWGU?si=KzUyCefmGJEcVpKa"
      title="YouTube video player"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
    <p> Using iframe to load another website
    </p>
    <iframe src="https://ekantipur.com/" width="560" height="350"></iframe>
  </body>
</html>
