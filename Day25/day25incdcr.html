<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Increment and Decrement</title>
</head>
<body>
    <div class="container text-center">
        <div class="card">
            <div class="card body">
               <h2>Simple incrementer</h2><h3>
                <div id="value">0</div>
               </h3>
             
            <button class="btn btn-danger" id="decrement">Decrement</button>
            <button class="btn btn-success" id="increment">Increment</button>
            </div>
        </div>
    </div>
    <script>
        const incrementButton= document.getElementById("increment");
        
        const decrementButton= document.getElementById("decrement");
        const value=document.getElementById("value");

        let count=0;
        function setCounter(count){
            value.textContent=count;
        }

        //code to increment value
        incrementButton.addEventListener("click", ()=>{
            count++;
            console.log(count);
             setCounter(count);
        });
        //code to decrement value
        decrementButton.addEventListener("click", ()=>{
            count--;
            console.log(count);
             setCounter(count);
        });
    </script>



</body>
</html>
