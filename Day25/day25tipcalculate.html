<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>
    <div class="container text-center mt-5">
        <h1>Tip Calculator</h1>
        <div class="mb-3">
            <label for="bill" class="form-label">Bill Amount ($)</label>
            <input type="number" id="bill" class="form-control" placeholder="Enter bill amount" />
        </div>
        <div class="mb-3">
            <label for="tip" class="form-label">Tip Percentage (%)</label>
            <input type="number" id="tip" class="form-control" placeholder="Enter tip percentage" />
        </div>
        <button id="calculate" class="btn btn-primary">Calculate Tip</button>
        <div id="result" class="mt-3"></div>
    </div>
    <script>
        const bill = document.getElementById("bill");
        const tip = document.getElementById("tip");
        const calculate = document.getElementById("calculate");
        const result = document.getElementById("result");
       
        calculate.addEventListener("click", () => {
            const billAmount = parseFloat(bill.value);
        


            const tipPercentage = parseFloat(tip.value);
            if (isNaN(billAmount) || isNaN(tipPercentage)) {
                result.textContent = "Please enter valid numbers";
                return;

            }
            // Actual logic to calculate tip
            const tipAmount = (billAmount * tipPercentage) / 100;
            const totalAmount = billAmount + tipAmount;

            result.textContent = `Tip: RS.${tipAmount} | Total: Rs.${totalAmount})`;
            


        });
    </script>


</body>

</html>
